<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{page.title}} | {{site.title}}</title>
    <meta name="description" content="{{page.description}}" />
    {{page.seoMeta}}
    <link href="{{page.assetRoot}}/favicon.ico" rel="icon" sizes="any" />
    <link href="{{page.assetRoot}}/site.css" rel="stylesheet" />
    <script defer src="{{page.assetRoot}}/site.js"></script>
  </head>
  <body class="site-shell">
    <div class="site-bg" aria-hidden="true"></div>
    <header class="topbar">
      <a
        class="brand"
        href="{{page.homeHref}}"
        title="Go to the Ingest homepage">
        <img alt="Ingest" class="brand-mark" src="{{page.assetRoot}}/ingest.png" />
        <span class="brand-copy">
          <h1>{{site.title}}</h1>
          <span>{{site.tagline}}</span>
        </span>
      </a>
      <div class="topbar-actions">
        <button
          aria-label="Toggle color theme"
          class="theme-toggle"
          id="theme-toggle"
          type="button">
          <span class="theme-toggle-label">Theme</span>
        </button>
      </div>
      <div class="topbar-meta">
        <a
          class="repo-link"
          href="{{site.repoUrl}}"
          title="Open the Ingest GitHub repository">
          GitHub
        </a>
      </div>
    </header>
    <main class="home-shell">
      <section class="hero home-hero">
        <div class="hero-copy">
          <p class="hero-summary">{{page.description}}</p>
          <div class="badges">
            <a href="https://www.npmjs.com/package/@stackpress/ingest" target="_blank">
              <img src="https://img.shields.io/npm/v/@stackpress/ingest.svg?style=flat" />
            </a>
            <a href="https://github.com/stackpress/ingest/actions" target="_blank">
              <img src="https://img.shields.io/github/actions/workflow/status/stackpress/ingest/test.yml" />
            </a>
            <a href="https://coveralls.io/github/stackpress/ingest?branch=main" target="_blank">
              <img src="https://coveralls.io/repos/github/stackpress/ingest/badge.svg?branch=main" />
            </a>
            <a href="https://github.com/stackpress/ingest/commits/main/" target="_blank">
              <img src="https://img.shields.io/github/last-commit/stackpress/ingest" />
            </a>
            <a href="https://github.com/stackpress/ingest/blob/main/LICENSE" target="_blank">
              <img src="https://img.shields.io/badge/license-Apache%202.0-blue.svg?style=flat" />
            </a>
          </div>
          {{page.heroActions}}
        </div>
        {{page.heroVisual}}
      </section>
      {{page.mainContent}}
      <footer class="footer">
        <p>By the stackpress team</p>
        <div class="footer-links">
          <a href="https://stackpress.io" target="_blank" rel="noreferrer">stackpress.io</a>
          <a href="https://github.com/stackpress/ingest" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </footer>
    </main>
  </body>
</html>
